<!--
  ══════════════════════════════════════════════════════
  ISTRUZIONI: Come aggiungere la traduzione alle altre pagine
  ══════════════════════════════════════════════════════
  
  1. Copia il file lang.js nella root del sito (stessa cartella di index.html)
  
  2. In OGNI altra pagina HTML (ausosa.html, television.html, ecc.)
     aggiungi questo blocco nel <head>, PRIMA di qualsiasi altro <script>:

     <script src="lang.js"></script>

  3. Aggiungi i bottoni lingua nella navbar di quella pagina:
  
     <div class="lang-switch">
       <button class="lang-btn" data-lang="it" onclick="LangSystem.set('it')">IT</button>
       <button class="lang-btn" data-lang="en" onclick="LangSystem.set('en')">EN</button>
     </div>

  4. Su ogni testo da tradurre, aggiungi data-it e data-en:
  
     <h1 data-it="Il mio album" data-en="My album">Il mio album</h1>
     <p data-it="Descrizione in italiano" data-en="Description in English">Descrizione in italiano</p>

  5. Nel <script> della pagina, aggiungi alla fine:
  
     // Aggiorna i bottoni lingua in base alla scelta salvata
     document.querySelectorAll('.lang-btn').forEach(b => {
       b.classList.toggle('active', b.dataset.lang === LangSystem.get());
     });

  NOTA: LangSystem.get() restituisce 'it' o 'en' — la scelta viene
  salvata automaticamente in localStorage e condivisa tra tutte le pagine.
  ══════════════════════════════════════════════════════
-->

<!-- ESEMPIO COMPLETO per ausosa.html o altra pagina album: -->

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!-- ... altri meta ... -->
  
  <!-- ★ OBBLIGATORIO: sistema traduzione — deve essere PRIMO script ★ -->
  <script src="lang.js"></script>
  
  <!-- ... fonts, CSS ... -->
</head>
<body>

<nav>
  <!-- ... altri link nav ... -->
  <div class="lang-switch">
    <button class="lang-btn" data-lang="it" onclick="LangSystem.set('it')">IT</button>
    <button class="lang-btn" data-lang="en" onclick="LangSystem.set('en')">EN</button>
  </div>
</nav>

<!-- Esempio sezione con traduzioni -->
<section>
  <h1 data-it="Ausosa" data-en="Ausosa">Ausosa</h1>
  <p data-it="Album · 2024" data-en="Album · 2024">Album · 2024</p>
  <p data-it="Descrizione dell'album..." data-en="Album description...">
    Descrizione dell'album...
  </p>
  <a href="index.html" data-it="← Torna alla home" data-en="← Back to home">← Torna alla home</a>
</section>

<script>
  // Sincronizza bottoni lingua con la scelta corrente
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === LangSystem.get());
  });
</script>
</body>
</html>
