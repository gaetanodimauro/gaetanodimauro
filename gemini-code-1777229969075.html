<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario Sonoro — Gaetano Di Mauro</title>

<script src="lang.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #060608;
  --bg2: #0c0c10;
  --white: #f0ede8;
  --gold: #b8963e;
  --gold3: rgba(184,150,62,.08);
}

body { background: var(--bg); color: var(--white); font-family: 'Cormorant Garamond', serif; margin: 0; overflow-x: hidden; }

/* Navbar */
nav { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: rgba(6,6,8,0.9); backdrop-filter: blur(10px); z-index: 1000; }
.logo { font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; text-decoration: none; color: var(--white); }
.nav-right { display: flex; gap: 2rem; align-items: center; }
.nav-links { display: flex; gap: 1.5rem; }
.nav-links a { text-decoration: none; color: var(--white); font-family: 'Space Mono'; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
.nav-links a:hover { color: var(--gold); }

/* Lang Switch */
.lang-switch { display: flex; gap: 8px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 1.5rem; }
.lang-btn { background: none; border: none; color: var(--white); font-family: 'Space Mono'; font-size: 0.75rem; cursor: pointer; opacity: 0.4; transition: 0.3s; padding: 4px 8px; }
.lang-btn.active { opacity: 1; color: var(--gold); font-weight: bold; }

/* Contenuti */
.blog-container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
.blog-header { text-align: center; margin-bottom: 4rem; }
.blog-header h1 { font-family: 'Bebas Neue'; font-size: 4rem; letter-spacing: 4px; margin: 0; }

.status-box { border: 1px solid var(--gold); padding: 2.5rem; margin-bottom: 5rem; background: var(--gold3); text-align: center; position: relative; }
.status-tag { font-family: 'Space Mono'; font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 1rem; }

.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 3rem; }
.blog-post { text-decoration: none; color: inherit; display: block; transition: 0.4s; }
.post-img-wrapper { overflow: hidden; aspect-ratio: 16/9; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
.post-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.6s; }
.blog-post:hover .post-img { transform: scale(1.05); opacity: 1; }

.post-title { font-size: 1.8rem; margin: 10px 0; font-weight: 600; }
.post-excerpt { font-size: 1.1rem; opacity: 0.7; line-height: 1.5; }

/* Scroll Reveal */
.reveal { opacity: 0; transform: translateY(25px); transition: 0.8s ease-out; }
.reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">GAETANO DI MAURO</a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="index.html" data-it="Home" data-en="Home">Home</a>
      <a href="blog.html" style="color: var(--gold);" data-it="Diario" data-en="Journal">Diario</a>
    </div>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="it" onclick="LangSystem.set('it')">ITA</button>
      <button class="lang-btn" data-lang="en" onclick="LangSystem.set('en')">EN</button>
    </div>
  </div>
</nav>

<div class="blog-container">
  <header class="blog-header reveal">
    <h1 data-it="DIARIO SONORO" data-en="SOUND JOURNAL">DIARIO SONORO</h1>
  </header>

  <div class="status-box reveal">
    <span class="status-tag" data-it="ATTUALITÀ" data-en="LATEST">ATTUALITÀ</span>
    <h2 data-it="Lancio del sito & Nuova musica" data-en="Site launch & New music">Lancio del sito & Nuova musica</h2>
    <p data-it="Sto lanciando il mio nuovo spazio digitale e preparo nuova musica. Questo diario racconterà l'evoluzione dei miei prossimi lavori." 
       data-en="I am launching my new digital space and preparing new music. This journal will share the evolution of my upcoming works.">
       Sto lanciando il mio nuovo spazio digitale e preparo nuova musica. Questo diario racconterà l'evoluzione dei miei prossimi lavori.
    </p>
  </div>

  <div class="blog-grid">
    <a href="ausosa.html" class="blog-post reveal">
      <div class="post-img-wrapper"><img src="COVER AUSOSA.jpg" class="post-img"></div>
      <div class="post-title" data-it="Il viaggio di Ausosa" data-en="The Journey of Ausosa">Il viaggio di Ausosa</div>
      <p class="post-excerpt" data-it="Dalle macerie alla rinascita dei fiori di Eirene." data-en="From the ruins to the rebirth of Eirene's flowers."></p>
    </a>

    <a href="interplay.html" class="blog-post reveal">
      <div class="post-img-wrapper"><img src="Interplay.jpg" class="post-img"></div>
      <div class="post-title" data-it="Interplay" data-en="Interplay">Interplay</div>
      <p class="post-excerpt" data-it="Dialogo improvvisato con Antonino Cortese." data-en="Improvised dialogue with Antonino Cortese."></p>
    </a>

    <a href="television.html" class="blog-post reveal">
      <div class="post-img-wrapper"><img src="Television copia.jpg" class="post-img"></div>
      <div class="post-title" data-it="Television" data-en="Television">Television</div>
      <p class="post-excerpt" data-it="Un'analisi concettuale sull'etere catodico." data-en="A conceptual analysis of the cathode ether."></p>
    </a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 1. Applica lingua iniziale salvata
  if(window.LangSystem) LangSystem.apply();

  // 2. Animazioni reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if(e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), i * 80);
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
});

// 3. Ascolta il cambio lingua per aggiornare i bottoni graficamente
document.addEventListener('langchange', (e) => {
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === e.detail.lang);
  });
});
</script>

</body>
</html>
